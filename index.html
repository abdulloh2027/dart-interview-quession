<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, query, where, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      window.initFirebase = function() {
        const apiKey = localStorage.getItem("fb_apiKey");
        const projectId = localStorage.getItem("fb_projectId");
        const appId = localStorage.getItem("fb_appId");

        if (apiKey && projectId && appId) {
          const firebaseConfig = {
            apiKey: apiKey,
            authDomain: projectId + ".firebaseapp.com",
            projectId: projectId,
            storageBucket: projectId + ".appspot.com",
            appId: appId
          };
          try {
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            window.db = db;
            window.fbFunctions = { collection, addDoc, getDocs, deleteDoc, doc, updateDoc, query, where, getDoc };
            console.log("Firebase successfully configured from settings.");
            return true;
          } catch (e) {
            console.error("Firebase config error:", e);
            return false;
          }
        } else {
          console.warn("Firebase not configured. Please use Settings modal.");
          window.db = null;
          window.fbFunctions = null;
          return false;
        }
      };

      // Initial run
      window.initFirebase();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
